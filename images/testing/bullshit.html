<!DOCTYPE html>
<html>
    <head>
        <script>
            function getFileFromURL(url) {
                return new Promise((res, rej) => {
                    if (!url) {
                        url = "https://picsum.photos/300";
                    }
                    fetch(url)
                    .then((response) => {
                        return response.arrayBuffer();
                    })
                    .then((buf) => {
                        console.log("buf: ", buf);
                        console.log(buf instanceof ArrayBuffer);
                        // the filename will be replaced with a random hex when it's uploaded
                        const file = new File([buf], 'image_upload.jpg', {type: 'image/jpg'});
                        res(file);
                    })
                    .catch((err) => {
                        return err;
                    });
                })
                .catch((err) => {
                    rej(new Error(err));
                });
            }

            getFileFromURL().then((file) => {
                console.log(file.type);
            })
        </script>
    </head>
</html>
